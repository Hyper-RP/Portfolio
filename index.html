<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div id="wrapper">
        <div class="container">
            <header>
                <div class="logo-container">
                    <img src="assets/R-img.jpg" alt="not found" class="letter-img">
                    <div class="logo-text">ohit</div>
                </div>

                <div class="navbar">
                    <div><a href="" class="nav-items">Projects</a></div>
                    <div><a href="" class="nav-items">Skills</a></div>
                    <div><a href="" class="nav-items">Contact Me</a></div>
                </div>
            </header>

            <div class="hero-section">
                <div class="hero-sction-left">
                        <div class="hs-left" id="hsl-name">Hi! Rohit Patil</div>
                        <div class="hs-left" id="hsl-role">  
                            I am a <span class="role"></span>
                        </div>
                        <div class="hs-left" id="hsl-desc">I'm a software deveoper and here is my portfolio website here you'll learn about my journey as a software developer</div>
                        <div class="hs-left button">Hire me</div>
                </div>
                <div class="hero-sction-right">
                    <div class="img-user">
                        <img src="assets/User.png" alt=" not found">
                    </div>
                    <div class="img-icon circle">
                       <img src="assets/circle.png" alt="">
                    </div>
                    <div class="img-icon cube">
                        <img src="assets/cube.png" alt="">
                    </div>
                    <div class="img-icon dots">
                        <img src="assets/dots.png" alt="">
                    </div>
                    <div class="img-icon plus">
                        <img src="assets/plus.png" alt="">
                    </div>
                    <div class="img-icon zigzags">
                        <img src="assets/zigzags.png" alt="">
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
  <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
  <script>
    var typeData = new Typed(".role", {
      strings: [
        "Coder",
        "Software Developer",
        "Full Stack Developer",
        "Web Developer",
        "UI-UX Designer",
        "Backend Developer",
      ],
      loop: true,
      typeSpeed: 100,
      backSpeed: 80,
      backDelay: 1000,
    });
  </script>

</body>
</html>
